# Render Blueprint for relay (codename). Deploy via Render → New → Blueprint,
# connect this repo, and fill in the secret env vars (marked sync:false) in the
# dashboard. See DEPLOY.md for the full walkthrough.
#
# IMPORTANT: use a remote Turso database (libsql://…), NOT a file: URL. Render's
# filesystem is ephemeral and not shared between the web service and cron jobs,
# so a SQLite file would not persist or be visible across services.

services:
  - type: web
    name: relay-web
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    # NOTE: preDeployCommand only runs on Render's PAID instance types — the
    # free plan skips it. The app therefore self-migrates on first DB use
    # (lib/db.ts ensureSchema), so the schema is guaranteed regardless of plan.
    # This line is kept for paid plans as a belt-and-braces; it is harmless and
    # idempotent (CREATE TABLE IF NOT EXISTS).
    preDeployCommand: npm run db:migrate
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22"
      # --- secrets: set these in the Render dashboard ---
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      # Pick a current model from Groq's catalogue at deploy time (SPEC §13).
      - key: GROQ_MODEL
        sync: false
      # Optional: a Groq vision model for image OCR; falls back to Tesseract.
      - key: GROQ_VISION_MODEL
        sync: false
      - key: DEFAULT_USER_EMAIL
        sync: false
      # --- email (Resend) ---
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      # --- web push (app notifications): npx web-push generate-vapid-keys ---
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      # --- scheduling: shared secret for the cron endpoints, and the app's
      #     own URL for links in emails/notifications ---
      - key: CRON_SECRET
        sync: false
      - key: APP_BASE_URL
        sync: false
      # --- tunables with sensible defaults ---
      - key: CONFIDENCE_THRESHOLD
        value: "0.6"
      - key: RAW_RETENTION_DAYS
        value: "30"
      - key: DEFAULT_USER_TIMEZONE
        value: Europe/London

