<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720" font-family="Manrope, Arial, sans-serif">
  <!-- nudge — animated walkthrough: messy capture → sorted, dated tasks (loops) -->
  <rect width="1280" height="720" fill="#F8F7F4"/>

  <!-- heading -->
  <text x="64" y="84" font-size="34" font-weight="800" fill="#232A32">Messy in, sorted out.</text>

  <!-- LEFT: messy capture -->
  <g>
    <rect x="64" y="130" width="520" height="470" rx="18" fill="#FFFFFF" stroke="#E9E9E3"/>
    <text x="96" y="178" font-size="14" font-weight="700" letter-spacing="1" fill="#667085">MESSY IN</text>
    <rect x="96" y="200" width="456" height="150" rx="10" fill="#F8F7F4"/>
    <text x="116" y="234" font-size="18" fill="#232A32">Fwd: Oakwood newsletter —</text>
    <text x="116" y="264" font-size="18" fill="#232A32">PE kits needed <tspan font-weight="800">Friday</tspan>, museum</text>
    <text x="116" y="294" font-size="18" fill="#232A32">trip <tspan font-weight="800">£15 due 15 June</tspan>,</text>
    <text x="116" y="324" font-size="18" fill="#232A32">parents’ evening booking open…</text>
    <g font-size="14" fill="#667085">
      <rect x="96" y="372" width="92" height="34" rx="17" fill="#F8F7F4" stroke="#E9E9E3"/>
      <text x="116" y="394">✉️ email</text>
      <rect x="198" y="372" width="96" height="34" rx="17" fill="#F8F7F4" stroke="#E9E9E3"/>
      <text x="218" y="394">📷 photo</text>
      <rect x="304" y="372" width="92" height="34" rx="17" fill="#F8F7F4" stroke="#E9E9E3"/>
      <text x="324" y="394">🎤 voice</text>
    </g>
  </g>

  <!-- arrow / sparkle -->
  <text x="640" y="375" font-size="44" font-weight="800" fill="#7BAA94" text-anchor="middle">
    →
    <animate attributeName="opacity" values="1;0.4;1" keyTimes="0;0.5;1" dur="2s" repeatCount="indefinite"/>
  </text>

  <!-- RIGHT: sorted tasks -->
  <g>
    <rect x="696" y="130" width="520" height="470" rx="18" fill="#FFFFFF" stroke="#E9E9E3"/>
    <text x="728" y="178" font-size="14" font-weight="700" letter-spacing="1" fill="#667085">SORTED OUT</text>

    <!-- task 1 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;0" keyTimes="0;0.22;0.30;0.92;0.96;1" dur="9s" repeatCount="indefinite"/>
      <rect x="728" y="200" width="456" height="64" rx="12" fill="#F8F7F4"/>
      <text x="752" y="240" font-size="20" fill="#232A32">🎒 Bring PE kit</text>
      <text x="1160" y="240" font-size="16" font-weight="700" fill="#7BAA94" text-anchor="end">Fri</text>
    </g>
    <!-- task 2 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;0" keyTimes="0;0.40;0.48;0.92;0.96;1" dur="9s" repeatCount="indefinite"/>
      <rect x="728" y="276" width="456" height="64" rx="12" fill="#F8F7F4"/>
      <text x="752" y="316" font-size="20" fill="#232A32">💷 Pay £15 trip</text>
      <text x="1160" y="316" font-size="16" font-weight="700" fill="#7BAA94" text-anchor="end">by 15 Jun</text>
    </g>
    <!-- task 3 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;0" keyTimes="0;0.58;0.66;0.92;0.96;1" dur="9s" repeatCount="indefinite"/>
      <rect x="728" y="352" width="456" height="64" rx="12" fill="#F8F7F4"/>
      <text x="752" y="392" font-size="20" fill="#232A32">📅 Parents’ evening — book</text>
      <text x="1160" y="392" font-size="16" font-weight="700" fill="#7BAA94" text-anchor="end">soon</text>
    </g>
  </g>

  <!-- wordmark -->
  <text x="64" y="660" font-size="22" font-weight="800" fill="#232A32">nudge<tspan fill="#667085" font-weight="600"> — a gentle nudge for everything that matters</tspan></text>
</svg>
