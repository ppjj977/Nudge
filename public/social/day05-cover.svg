    <text x="320" y="632" font-size="26" fill="#232A32">Lock in founder perks</text>
    <text x="320" y="702" font-size="24" fill="#9AA4AE" font-style="italic">before the doors open</text>
  </g>

  <text x="540" y="910" font-size="40" font-weight="800" fill="#7BAA94" text-anchor="middle">Get in early ↓</text>
  
  <rect x="120" y="970" width="840" height="170" rx="20" fill="#FFFFFF" stroke="#E9E9E3" stroke-width="2"/>
  <text x="160" y="1056" font-size="40" font-weight="800" fill="#232A32">First 10 to register</text>
  <text x="160" y="1104" font-size="27" fill="#667085">Nudge Pro — free for LIFE</text>
  <rect x="770" y="1020" width="140" height="70" rx="14" fill="#E8A24A"/>
  <text x="840" y="1067" font-size="30" font-weight="800" fill="#FFFFFF" text-anchor="middle">10</text>
  <rect x="120" y="1170" width="840" height="170" rx="20" fill="#FFFFFF" stroke="#E9E9E3" stroke-width="2"/>
  <text x="160" y="1256" font-size="40" font-weight="800" fill="#232A32">Everyone else who joins</text>
  <text x="160" y="1304" font-size="27" fill="#667085">3 months of Pro, free</text>
  <rect x="770" y="1220" width="140" height="70" rx="14" fill="#7BAA94"/>
  <text x="840" y="1267" font-size="30" font-weight="800" fill="#FFFFFF" text-anchor="middle">3MO</text>
  
  <rect x="90" y="1470" width="900" height="300" rx="26" fill="#232A32"/>
  <text x="540" y="1556" font-size="30" font-weight="700" fill="#9FD3BD" text-anchor="middle" letter-spacing="2">LAUNCH OFFER</text>
  <text x="540" y="1622" font-size="40" font-weight="800" fill="#FFFFFF" text-anchor="middle">First 10 to register interest</text>
  <text x="540" y="1680" font-size="44" font-weight="800" fill="#9FD3BD" text-anchor="middle">get Nudge Pro FREE for life</text>
  <text x="540" y="1742" font-size="34" font-weight="700" fill="#FFFFFF" text-anchor="middle">nudgelive.co.uk · link in bio</text>
