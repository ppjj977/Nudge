  <g opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.1;0.18;1" dur="14s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 26;0 26;0 0;0 0" keyTimes="0;0.1;0.18;1" dur="14s" repeatCount="indefinite"/><g transform="rotate(-6 510 515)"><rect x="250" y="470" width="520" height="90" rx="14" fill="#9FD3BD" stroke="#00000014" stroke-width="2"/><text x="274" y="526" font-size="30" font-weight="700" fill="#232A32">Bin day (which bin?)</text></g><g transform="rotate(5 570 635)"><rect x="310" y="590" width="520" height="90" rx="14" fill="#FBE7BD" stroke="#00000014" stroke-width="2"/><text x="334" y="646" font-size="30" font-weight="700" fill="#232A32">Dentist — Tuesday?</text></g><g transform="rotate(-6 510 755)"><rect x="250" y="710" width="520" height="90" rx="14" fill="#ECE6D6" stroke="#00000014" stroke-width="2"/><text x="274" y="766" font-size="30" font-weight="700" fill="#232A32">Mum's birthday soon</text></g><g transform="rotate(5 570 875)"><rect x="310" y="830" width="520" height="90" rx="14" fill="#D9E7DF" stroke="#00000014" stroke-width="2"/><text x="334" y="886" font-size="30" font-weight="700" fill="#232A32">That bill. Which bill.</text></g></g>
  <g opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.42;0.5;1" dur="14s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 26;0 26;0 0;0 0" keyTimes="0;0.42;0.5;1" dur="14s" repeatCount="indefinite"/><path d="M 540 1000 l 0 60 M 518 1036 l 22 26 l 22 -26" fill="none" stroke="#7BAA94" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/><rect x="240" y="1110" width="600" height="120" rx="18" fill="#FFFFFF" stroke="#E9E9E3" stroke-width="2"/><circle cx="284" cy="1170" r="22" fill="none" stroke="#7BAA94" stroke-width="5"/><path d="M 270 1170 l 9 11 l 19 -23" fill="none" stroke="#7BAA94" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><text x="326" y="1182" font-size="34" font-weight="800" fill="#232A32">Dentist — Tue 9:30</text><rect x="708" y="1142" width="108" height="56" rx="14" fill="#7BAA94"/><text x="762" y="1180" font-size="28" font-weight="800" fill="#FFFFFF" text-anchor="middle">TUE</text></g>
  <g opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.78;0.84;1" dur="14s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 26;0 26;0 0;0 0" keyTimes="0;0.78;0.84;1" dur="14s" repeatCount="indefinite"/><rect x="90" y="1640" width="900" height="210" rx="28" fill="#232A32"/><text x="540" y="1716" font-size="33" font-weight="800" fill="#ECE6D6" text-anchor="middle">First 10 to register = Pro free for life</text><text x="540" y="1772" font-size="29" font-weight="700" fill="#9FD3BD" text-anchor="middle">then 3 months free for everyone else</text><text x="540" y="1822" font-size="31" font-weight="800" fill="#E8A24A" text-anchor="middle">nudgelive.co.uk</text></g>
  <rect x="0" y="1900" width="0" height="20" fill="#7BAA94">
