<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920" font-family="Manrope, Arial, sans-serif">
  <!-- Nudge demo: forward a school email → tasks + checklist. Mock data only.
       Vertical 9:16, loops every 15s. Screen-record full-screen on a phone. -->
  <rect width="1080" height="1920" fill="#F8F7F4"/>

  <!-- wordmark -->
  <rect x="430" y="70" width="64" height="64" rx="18" fill="#7BAA94"/>
  <text x="462" y="116" font-size="40" font-weight="800" fill="#FFFFFF" text-anchor="middle">n</text>
  <text x="512" y="116" font-size="38" font-weight="800" fill="#232A32">nudge</text>

  <!-- ===== SCENE A — the email ===== -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.03;0.31;0.345;1" dur="15s" repeatCount="indefinite"/>
    <text x="540" y="300" font-size="56" font-weight="800" fill="#232A32" text-anchor="middle">A school email with</text>
    <text x="540" y="370" font-size="56" font-weight="800" fill="#232A32" text-anchor="middle">5 things buried in it 🫠</text>

    <g transform="rotate(-3 540 1010)">
      <rect x="160" y="520" width="760" height="940" rx="16" fill="#FFFFFF" stroke="#E9E9E3" stroke-width="2"/>
      <rect x="160" y="520" width="760" height="118" rx="16" fill="#EDF2EF"/>
      <text x="210" y="592" font-size="32" font-weight="800" fill="#3C5A4C">OAKWOOD ACADEMY</text>
      <text x="210" y="704" font-size="30" fill="#667085">Year 7 Transition — parent letter</text>
      <line x1="210" y1="734" x2="870" y2="734" stroke="#E9E9E3" stroke-width="2"/>
      <text x="210" y="800" font-size="30" fill="#232A32">Transition Days: <tspan font-weight="800">23–24 June</tspan>, arrive</text>
      <text x="210" y="846" font-size="30" fill="#232A32">main entrance by <tspan font-weight="800">8:40am</tspan>.</text>
      <text x="210" y="916" font-size="30" fill="#232A32">Wear primary PE kit; pack a lunch</text>
      <text x="210" y="962" font-size="30" fill="#232A32">&amp; water bottle each day.</text>
      <text x="210" y="1032" font-size="30" fill="#232A32">Written permission needed if your</text>
      <text x="210" y="1078" font-size="30" fill="#232A32">child may walk home alone.</text>
      <text x="210" y="1148" font-size="30" fill="#232A32">Rising to Year 7 Evening:</text>
      <text x="210" y="1194" font-size="30" fill="#232A32"><tspan font-weight="800">Thu 9 July, 6:00pm</tspan>, Main Reception…</text>
      <text x="210" y="1300" font-size="27" fill="#9AA4AE" font-style="italic">…and three more paragraphs.</text>
    </g>

    <g>
      <rect x="300" y="1540" width="480" height="80" rx="40" fill="#232A32"/>
      <text x="540" y="1591" font-size="30" font-weight="700" fill="#FFFFFF" text-anchor="middle">✉️ Forward it to Nudge</text>
      <animate attributeName="opacity" values="0.45;1;0.45" dur="1.6s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- ===== SCENE B — sorted tasks ===== -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.345;0.38;0.75;0.785;1" dur="15s" repeatCount="indefinite"/>

    <rect x="170" y="280" width="740" height="84" rx="42" fill="#EDF2EF"/>
    <text x="540" y="334" font-size="33" font-weight="800" fill="#3C5A4C" text-anchor="middle">✨ Nudge pulled out 2 tasks</text>

    <!-- card 1: prepare + checklist -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.40;0.45;1" dur="15s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 26;0 26;0 0;0 0" keyTimes="0;0.40;0.46;1" dur="15s" repeatCount="indefinite"/>
      <rect x="110" y="404" width="860" height="396" rx="22" fill="#FFFFFF" stroke="#E9E9E3" stroke-width="2"/>
      <text x="150" y="476" font-size="40" font-weight="800" fill="#232A32">🎒 Prepare for Transition Days</text>
      <rect x="770" y="430" width="160" height="64" rx="14" fill="#7BAA94"/>
      <text x="850" y="472" font-size="28" font-weight="800" fill="#FFFFFF" text-anchor="middle">23 JUN</text>
      <text x="150" y="522" font-size="27" fill="#667085">Tue 23 Jun · 📍 Oakwood Academy</text>
      <text x="150" y="586" font-size="28" fill="#232A32">☑ Wear primary PE kit</text>
      <text x="150" y="636" font-size="28" fill="#232A32">☑ Pack lunch &amp; water each day</text>
      <text x="150" y="686" font-size="28" fill="#232A32">☐ Arrive main entrance by 8:40am</text>
      <text x="150" y="736" font-size="28" fill="#232A32">☐ Written permission to walk home</text>
    </g>

    <!-- card 2: attend evening -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.50;0.55;1" dur="15s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 26;0 26;0 0;0 0" keyTimes="0;0.50;0.56;1" dur="15s" repeatCount="indefinite"/>
      <rect x="110" y="830" width="860" height="190" rx="22" fill="#FFFFFF" stroke="#E9E9E3" stroke-width="2"/>
      <text x="150" y="902" font-size="40" font-weight="800" fill="#232A32">📅 Rising to Year 7 Evening</text>
      <rect x="760" y="856" width="170" height="64" rx="14" fill="#E8A24A"/>
      <text x="845" y="898" font-size="28" font-weight="800" fill="#FFFFFF" text-anchor="middle">9 JUL</text>
      <text x="150" y="956" font-size="27" fill="#667085">Thu 9 Jul, 18:00 · 📍 Main Reception</text>
    </g>

    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.60;0.64;1" dur="15s" repeatCount="indefinite"/>
      <text x="540" y="1110" font-size="34" font-weight="700" fill="#3C5A4C" text-anchor="middle">Dates, place &amp; a checklist —</text>
      <text x="540" y="1158" font-size="34" font-weight="700" fill="#3C5A4C" text-anchor="middle">all caught, none missed.</text>
    </g>
  </g>

  <!-- ===== SCENE C — promo ===== -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.785;0.82;0.99;1" dur="15s" repeatCount="indefinite"/>
    <text x="540" y="560" font-size="52" font-weight="800" fill="#232A32" text-anchor="middle">Stop re-reading</text>
    <text x="540" y="628" font-size="52" font-weight="800" fill="#232A32" text-anchor="middle">school emails.</text>
    <rect x="110" y="760" width="860" height="420" rx="28" fill="#FFFFFF" stroke="#7BAA94" stroke-width="3"/>
    <text x="540" y="860" font-size="64" text-anchor="middle">🎁</text>
    <text x="540" y="952" font-size="44" font-weight="800" fill="#232A32" text-anchor="middle">First 10 to register</text>
    <text x="540" y="1014" font-size="44" font-weight="800" fill="#232A32" text-anchor="middle">interest get Nudge Pro</text>
    <text x="540" y="1090" font-size="50" font-weight="800" fill="#7BAA94" text-anchor="middle">FREE for life</text>
    <text x="540" y="1320" font-size="40" font-weight="800" fill="#232A32" text-anchor="middle">nudgelive.co.uk</text>
    <g>
      <rect x="360" y="1380" width="360" height="86" rx="43" fill="#7BAA94"/>
      <text x="540" y="1436" font-size="34" font-weight="800" fill="#FFFFFF" text-anchor="middle">Link in bio 👆</text>
      <animate attributeName="opacity" values="0.55;1;0.55" dur="1.4s" repeatCount="indefinite"/>
    </g>
    <text x="540" y="1560" font-size="28" fill="#9AA4AE" text-anchor="middle">📱 Coming soon to Google Play</text>
  </g>

  <rect x="0" y="1900" width="0" height="20" fill="#7BAA94">
    <animate attributeName="width" values="0;1080" dur="15s" repeatCount="indefinite"/>
  </rect>
</svg>
