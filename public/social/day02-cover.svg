<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920" font-family="Inter, Arial, sans-serif">
  <!-- Nudge — Day 2 (brain-forgets) cover. Distinct bg + concept motif per day. -->
  <rect width="1080" height="1920" fill="#F8F7F4"/>
  <g transform="translate(475.0,67.0) scale(0.499)"><path d="M 16 16 L 50 16 A 34 34 0 0 1 84 50 L 84 84 L 50 84 A 34 34 0 0 1 16 50 Z" fill="none" stroke="#7BAA94" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/><text x="45" y="64" font-size="44" font-weight="700" fill="#232A32" text-anchor="middle">n</text><circle cx="64" cy="59" r="5.5" fill="#F5B52E"/></g><text x="540" y="104" font-size="34" font-weight="800" fill="#232A32">nudge</text>
  <text x="540" y="280" font-size="66" font-weight="800" fill="#232A32" text-anchor="middle">Things my brain</text>
  <text x="540" y="360" font-size="66" font-weight="800" fill="#232A32" text-anchor="middle">refuses to remember:</text>
  <g transform="rotate(-6 520 475)"><rect x="250" y="430" width="540" height="90" rx="14" fill="#9FD3BD" stroke="#00000014" stroke-width="2"/><text x="274" y="486" font-size="30" font-weight="700" fill="#232A32">Bin day — which bin??</text></g><g transform="rotate(5 580 579)"><rect x="310" y="534" width="540" height="90" rx="14" fill="#FBE7BD" stroke="#00000014" stroke-width="2"/><text x="334" y="590" font-size="30" font-weight="700" fill="#232A32">Mum's birthday… next month?</text></g><g transform="rotate(-6 520 683)"><rect x="250" y="638" width="540" height="90" rx="14" fill="#ECE6D6" stroke="#00000014" stroke-width="2"/><text x="274" y="694" font-size="30" font-weight="700" fill="#232A32">Dentist — some Tuesday?</text></g><g transform="rotate(5 580 787)"><rect x="310" y="742" width="540" height="90" rx="14" fill="#D9E7DF" stroke="#00000014" stroke-width="2"/><text x="334" y="798" font-size="30" font-weight="700" fill="#232A32">That bill. Which bill?</text></g><path d="M 540 884 l 0 60 M 518 920 l 22 26 l 22 -26" fill="none" stroke="#7BAA94" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/><rect x="200" y="972" width="680" height="100" rx="16" fill="#FFFFFF" stroke="#E9E9E3" stroke-width="2"/><circle cx="248" cy="1022" r="18" fill="none" stroke="#7BAA94" stroke-width="4"/><path d="M 234 1022 l 9 11 l 19 -23" fill="none" stroke="#7BAA94" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><text x="288" y="1034" font-size="32" font-weight="800" fill="#232A32">Put the bins out</text><rect x="674" y="998" width="206" height="48" rx="12" fill="#7BAA94"/><text x="777" y="1031" font-size="24" font-weight="800" fill="#FFFFFF" text-anchor="middle">EVERY THU</text><rect x="200" y="1088" width="680" height="100" rx="16" fill="#FFFFFF" stroke="#E9E9E3" stroke-width="2"/><circle cx="248" cy="1138" r="18" fill="none" stroke="#7BAA94" stroke-width="4"/><path d="M 234 1138 l 9 11 l 19 -23" fill="none" stroke="#7BAA94" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><text x="288" y="1150" font-size="32" font-weight="800" fill="#232A32">Mum's birthday</text><rect x="728" y="1114" width="152" height="48" rx="12" fill="#E8A24A"/><text x="804" y="1147" font-size="24" font-weight="800" fill="#232A32" text-anchor="middle">12 JUL</text><rect x="200" y="1204" width="680" height="100" rx="16" fill="#FFFFFF" stroke="#E9E9E3" stroke-width="2"/><circle cx="248" cy="1254" r="18" fill="none" stroke="#7BAA94" stroke-width="4"/><path d="M 234 1254 l 9 11 l 19 -23" fill="none" stroke="#7BAA94" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><text x="288" y="1266" font-size="32" font-weight="800" fill="#232A32">Dentist check-up</text><rect x="692" y="1230" width="188" height="48" rx="12" fill="#7BAA94"/><text x="786" y="1263" font-size="24" font-weight="800" fill="#FFFFFF" text-anchor="middle">TUE 9:30</text><rect x="200" y="1320" width="680" height="100" rx="16" fill="#FFFFFF" stroke="#E9E9E3" stroke-width="2"/><circle cx="248" cy="1370" r="18" fill="none" stroke="#7BAA94" stroke-width="4"/><path d="M 234 1370 l 9 11 l 19 -23" fill="none" stroke="#7BAA94" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><text x="288" y="1382" font-size="32" font-weight="800" fill="#232A32">Pay the water bill</text><rect x="728" y="1346" width="152" height="48" rx="12" fill="#E8A24A"/><text x="804" y="1379" font-size="24" font-weight="800" fill="#232A32" text-anchor="middle">28 JUN</text>
  <rect x="90" y="1640" width="900" height="210" rx="28" fill="#232A32"/><text x="540" y="1716" font-size="33" font-weight="800" fill="#ECE6D6" text-anchor="middle">First 10 to register = Pro free for life</text><text x="540" y="1772" font-size="29" font-weight="700" fill="#9FD3BD" text-anchor="middle">then 3 months free for everyone else</text><text x="540" y="1822" font-size="31" font-weight="800" fill="#E8A24A" text-anchor="middle">nudgelive.co.uk</text>
