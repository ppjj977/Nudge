<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920" font-family="Inter, Arial, sans-serif">
  <!-- Nudge — Day 0 (reset-mind): animated 9:16, loops 14s. Screen-record full-screen on a phone. -->
  <rect width="1080" height="1920" fill="#9FD3BD"/>
  <g transform="translate(475.0,67.0) scale(0.499)"><path d="M 16 16 L 50 16 A 34 34 0 0 1 84 50 L 84 84 L 50 84 A 34 34 0 0 1 16 50 Z" fill="none" stroke="#7BAA94" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/><text x="45" y="64" font-size="44" font-weight="700" fill="#232A32" text-anchor="middle">n</text><circle cx="64" cy="59" r="5.5" fill="#F5B52E"/></g><text x="540" y="104" font-size="34" font-weight="800" fill="#232A32">nudge</text>
  <g opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.03;0.07;1" dur="14s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 26;0 26;0 0;0 0" keyTimes="0;0.03;0.07;1" dur="14s" repeatCount="indefinite"/><text x="540" y="280" font-size="66" font-weight="800" fill="#232A32" text-anchor="middle">How to reset your mind</text>
  <text x="540" y="360" font-size="66" font-weight="800" fill="#232A32" text-anchor="middle">(in 2 minutes)</text></g>
  <g opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.1;0.18;1" dur="14s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 26;0 26;0 0;0 0" keyTimes="0;0.1;0.18;1" dur="14s" repeatCount="indefinite"/><rect x="150" y="450" width="780" height="380" rx="44" fill="#FFFFFF" opacity="0.5"/><circle cx="250" cy="868" r="26" fill="#FFFFFF" opacity="0.5"/><circle cx="198" cy="912" r="15" fill="#FFFFFF" opacity="0.5"/><g transform="rotate(-7 392 532)"><rect x="212" y="498" width="360" height="68" rx="14" fill="#FFFFFF" stroke="#0000001a" stroke-width="2"/><text x="234" y="542" font-size="28" font-weight="700" fill="#232A32">the gas bill</text></g><g transform="rotate(5 668 590)"><rect x="458" y="556" width="420" height="68" rx="14" fill="#FFFFFF" stroke="#0000001a" stroke-width="2"/><text x="480" y="600" font-size="28" font-weight="700" fill="#232A32">reply to Sam</text></g><g transform="rotate(4 414 670)"><rect x="214" y="636" width="400" height="68" rx="14" fill="#FFFFFF" stroke="#0000001a" stroke-width="2"/><text x="236" y="680" font-size="28" font-weight="700" fill="#232A32">bins Thursday</text></g><g transform="rotate(-5 655 750)"><rect x="440" y="716" width="430" height="68" rx="14" fill="#FFFFFF" stroke="#0000001a" stroke-width="2"/><text x="462" y="760" font-size="28" font-weight="700" fill="#232A32">mum's birthday?</text></g></g>
  <g opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.42;0.5;1" dur="14s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 26;0 26;0 0;0 0" keyTimes="0;0.42;0.5;1" dur="14s" repeatCount="indefinite"/><path d="M 540 868 l 0 60 M 518 904 l 22 26 l 22 -26" fill="none" stroke="#3C5A4C" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/><rect x="170" y="962" width="716" height="76" rx="14" fill="#FFFFFF"/><circle cx="214" cy="1000" r="16" fill="none" stroke="#7BAA94" stroke-width="4"/><path d="M 200 1000 l 9 11 l 19 -23" fill="none" stroke="#7BAA94" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><text x="250" y="1010" font-size="30" font-weight="800" fill="#232A32">Pay the gas bill</text><rect x="805" y="980" width="81" height="40" rx="10" fill="#E8A24A"/><text x="845.5" y="1007" font-size="21" font-weight="800" fill="#232A32" text-anchor="middle">FRI</text><rect x="170" y="1054" width="716" height="76" rx="14" fill="#FFFFFF"/><circle cx="214" cy="1092" r="16" fill="none" stroke="#7BAA94" stroke-width="4"/><path d="M 200 1092 l 9 11 l 19 -23" fill="none" stroke="#7BAA94" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><text x="250" y="1102" font-size="30" font-weight="800" fill="#232A32">Reply to Sam</text><rect x="775" y="1072" width="111" height="40" rx="10" fill="#7BAA94"/><text x="830.5" y="1099" font-size="21" font-weight="800" fill="#FFFFFF" text-anchor="middle">TODAY</text><rect x="170" y="1146" width="716" height="76" rx="14" fill="#FFFFFF"/><circle cx="214" cy="1184" r="16" fill="none" stroke="#7BAA94" stroke-width="4"/><path d="M 200 1184 l 9 11 l 19 -23" fill="none" stroke="#7BAA94" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><text x="250" y="1194" font-size="30" font-weight="800" fill="#232A32">Put the bins out</text><rect x="805" y="1164" width="81" height="40" rx="10" fill="#7BAA94"/><text x="845.5" y="1191" font-size="21" font-weight="800" fill="#FFFFFF" text-anchor="middle">THU</text><text x="540" y="1300" font-size="38" font-weight="800" fill="#3C5A4C" text-anchor="middle">Out of your head. That's the reset.</text></g>
  <g opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.78;0.84;1" dur="14s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 26;0 26;0 0;0 0" keyTimes="0;0.78;0.84;1" dur="14s" repeatCount="indefinite"/><rect x="90" y="1670" width="900" height="150" rx="28" fill="#232A32"/><text x="540" y="1734" font-size="34" font-weight="800" fill="#ECE6D6" text-anchor="middle">First 10 to register = Pro free for life</text><text x="540" y="1790" font-size="32" font-weight="800" fill="#E8A24A" text-anchor="middle">nudgelive.co.uk</text></g>
  <rect x="0" y="1900" width="0" height="20" fill="#3C5A4C">
    <animate attributeName="width" values="0;1080" dur="14s" repeatCount="indefinite"/>
  </rect>
</svg>
