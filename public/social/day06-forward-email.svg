<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920" font-family="Inter, Arial, sans-serif">
  <!-- Nudge — Day 6 (forward-email): animated 9:16, loops 14s. Screen-record full-screen on a phone. -->
  <rect width="1080" height="1920" fill="#F8F7F4"/>
  
  <g transform="translate(405.9,53.9) scale(0.922)"><path d="M 16 16 L 50 16 A 34 34 0 0 1 84 50 L 84 84 L 50 84 A 34 34 0 0 1 16 50 Z" fill="none" stroke="#7BAA94" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/><text x="45" y="64" font-size="44" font-weight="700" fill="#232A32" text-anchor="middle">n</text><circle cx="64" cy="59" r="5.5" fill="#F5B52E"/></g>
  <text x="520" y="118" font-size="38" font-weight="800" fill="#232A32">nudge</text>

  <!-- SCENE 1: hook + the messy input -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.03;0.31;0.345;1" dur="14s" repeatCount="indefinite"/>
    <text x="540" y="320" font-size="58" font-weight="800" fill="#232A32" text-anchor="middle">Forward your chaos</text>
    <text x="540" y="392" font-size="58" font-weight="800" fill="#232A32" text-anchor="middle">to a robot. Watch.</text>
    <g transform="rotate(-3 540 1080)">
      <rect x="190" y="600" width="700" height="900" rx="16" fill="#FFFFFF" stroke="#E9E9E3" stroke-width="2"/>
      <rect x="190" y="600" width="700" height="120" rx="16" fill="#EDF2EF"/>
      <text x="240" y="678" font-size="34" font-weight="800" fill="#3C5A4C">FWD: Booking confirmed</text>
      <line x1="240" y1="760" x2="840" y2="760" stroke="#E9E9E3" stroke-width="2"/>
      <text x="240" y="884" font-size="32" fill="#232A32">Your table for 4 is booked</text>
      <text x="240" y="948" font-size="32" fill="#232A32">Fri 20 June, 7:30pm</text>
      <text x="240" y="1012" font-size="32" fill="#232A32">The Brasserie, High St</text>
      <text x="240" y="1076" font-size="32" fill="#232A32">Ref: BR-8821</text>
      <text x="240" y="1180" font-size="28" fill="#9AA4AE" font-style="italic">forward it to Nudge →</text>
    </g>
  </g>

  <!-- SCENE 2: Nudge sorts it -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.345;0.38;0.75;0.785;1" dur="14s" repeatCount="indefinite"/>
    <rect x="180" y="300" width="720" height="84" rx="42" fill="#EDF2EF"/>
    <text x="540" y="354" font-size="34" font-weight="800" fill="#3C5A4C" text-anchor="middle">✨ Forwarded → sorted</text>
    
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.40;0.44;1" dur="14s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 28;0 28;0 0;0 0" keyTimes="0;0.40;0.45;1" dur="14s" repeatCount="indefinite"/>
      <rect x="120" y="540" width="840" height="200" rx="22" fill="#FFFFFF" stroke="#E9E9E3" stroke-width="2"/>
      <text x="170" y="636" font-size="44" font-weight="800" fill="#232A32">🍽️ Dinner — table for 4</text>
      <text x="170" y="696" font-size="30" fill="#667085">The Brasserie, 7:30pm</text>
      <rect x="790" y="586" width="150" height="78" rx="16" fill="#7BAA94"/>
      <text x="865" y="637" font-size="32" font-weight="800" fill="#FFFFFF" text-anchor="middle">FRI</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.54;0.58;1" dur="14s" repeatCount="indefinite"/>
      <text x="540" y="840" font-size="34" fill="#3C5A4C" text-anchor="middle" font-weight="700">Forward any email to Nudge.</text>
      <text x="540" y="896" font-size="32" fill="#667085" text-anchor="middle">It pulls out the what, when &amp; where.</text>
    </g>
  </g>

  
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.785;0.82;0.99;1" dur="14s" repeatCount="indefinite"/>
    <text x="540" y="560" font-size="52" font-weight="800" fill="#232A32" text-anchor="middle">Stop holding it all</text>
    <text x="540" y="628" font-size="52" font-weight="800" fill="#232A32" text-anchor="middle">in your head.</text>
    <rect x="110" y="760" width="860" height="420" rx="28" fill="#FFFFFF" stroke="#7BAA94" stroke-width="3"/>
    <text x="540" y="860" font-size="64" text-anchor="middle">🎁</text>
    <text x="540" y="952" font-size="44" font-weight="800" fill="#232A32" text-anchor="middle">First 10 to register</text>
    <text x="540" y="1014" font-size="44" font-weight="800" fill="#232A32" text-anchor="middle">interest get Nudge Pro</text>
    <text x="540" y="1090" font-size="50" font-weight="800" fill="#7BAA94" text-anchor="middle">FREE for life</text>
    <text x="540" y="1320" font-size="40" font-weight="800" fill="#232A32" text-anchor="middle">nudgelive.co.uk</text>
    <g>
      <rect x="360" y="1380" width="360" height="86" rx="43" fill="#7BAA94"/>
      <text x="540" y="1436" font-size="34" font-weight="800" fill="#FFFFFF" text-anchor="middle">Link in bio 👆</text>
      <animate attributeName="opacity" values="0.55;1;0.55" dur="1.4s" repeatCount="indefinite"/>
    </g>
    <text x="540" y="1560" font-size="28" fill="#9AA4AE" text-anchor="middle">📱 Coming soon to Google Play</text>
  </g>

  <rect x="0" y="1900" width="0" height="20" fill="#7BAA94">
    <animate attributeName="width" values="0;1080" dur="14s" repeatCount="indefinite"/>
  </rect>
</svg>
