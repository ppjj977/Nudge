  <text x="540" y="360" font-size="66" font-weight="800" fill="#ECE6D6" text-anchor="middle">you always forget?</text></g>
  <g opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.1;0.18;1" dur="14s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 26;0 26;0 0;0 0" keyTimes="0;0.1;0.18;1" dur="14s" repeatCount="indefinite"/><text x="540" y="930" font-size="420" font-weight="800" fill="#E8A24A" text-anchor="middle">?</text><rect x="160" y="540" width="300" height="80" rx="40" fill="#FFFFFF"/><text x="310" y="592" font-size="30" font-weight="700" fill="#232A32" text-anchor="middle">bin day?</text><rect x="640" y="640" width="360" height="80" rx="40" fill="#FFFFFF"/><text x="820" y="692" font-size="30" font-weight="700" fill="#232A32" text-anchor="middle">that 'starred' email?</text><rect x="250" y="1040" width="340" height="80" rx="40" fill="#FFFFFF"/><text x="420" y="1092" font-size="30" font-weight="700" fill="#232A32" text-anchor="middle">renew the car tax?</text></g>
