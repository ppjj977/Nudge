<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920" font-family="Manrope, Arial, sans-serif">
  <!-- Nudge — Day 1 TikTok/Reels: "the school letter that's been in your bag for 3 days"
       Vertical 9:16, loops every 14s. Screen-record this full-screen on a phone. -->
  <rect width="1080" height="1920" fill="#F8F7F4"/>

  <!-- brand wordmark (always on) -->
  <g>
    <g stroke="#F5B52E" stroke-width="4.608" stroke-linecap="round"><line x1="493.3" y1="102.0" x2="506.2" y2="102.0"/><line x1="490.9" y1="114.0" x2="502.9" y2="118.9"/><line x1="484.2" y1="124.2" x2="493.3" y2="133.3"/><line x1="474.0" y1="130.9" x2="478.9" y2="142.9"/><line x1="462.0" y1="133.3" x2="462.0" y2="146.2"/><line x1="450.0" y1="130.9" x2="445.1" y2="142.9"/><line x1="439.8" y1="124.2" x2="430.7" y2="133.3"/><line x1="433.1" y1="114.0" x2="421.1" y2="118.9"/><line x1="430.7" y1="102.0" x2="417.8" y2="102.0"/><line x1="433.1" y1="90.0" x2="421.1" y2="85.1"/><line x1="439.8" y1="79.8" x2="430.7" y2="70.7"/><line x1="450.0" y1="73.1" x2="445.1" y2="61.1"/><line x1="462.0" y1="70.7" x2="462.0" y2="57.8"/><line x1="474.0" y1="73.1" x2="478.9" y2="61.1"/><line x1="484.2" y1="79.8" x2="493.3" y2="70.7"/><line x1="490.9" y1="90.0" x2="502.9" y2="85.1"/></g><circle cx="462" cy="102" r="23.04" fill="#7BAA94"/><text x="462" y="114.1" font-family="Manrope, Arial, sans-serif" font-size="35" font-weight="800" fill="#FFFFFF" text-anchor="middle">n</text>
  <text x="520" y="112" font-size="38" font-weight="800" fill="#232A32">nudge</text>
  </g>

  <!-- ===================== SCENE 1 — the hook + crumpled letter ===================== -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.03;0.31;0.345;1" dur="14s" repeatCount="indefinite"/>

    <text x="540" y="320" font-size="58" font-weight="800" fill="#232A32" text-anchor="middle">POV: the school letter</text>
    <text x="540" y="392" font-size="58" font-weight="800" fill="#232A32" text-anchor="middle">that's been in your bag</text>
    <text x="540" y="464" font-size="58" font-weight="800" fill="#232A32" text-anchor="middle">for 3 days <tspan>😵‍💫</tspan></text>

    <!-- crumpled letter (slightly tilted paper) -->
    <g transform="rotate(-3 540 1080)">
      <rect x="190" y="600" width="700" height="900" rx="16" fill="#FFFFFF" stroke="#E9E9E3" stroke-width="2"/>
      <rect x="190" y="600" width="700" height="120" rx="16" fill="#EDF2EF"/>
      <text x="240" y="678" font-size="34" font-weight="800" fill="#3C5A4C">OAKWOOD PRIMARY</text>
      <text x="240" y="780" font-size="30" fill="#667085" letter-spacing="1">WEEKLY NEWSLETTER</text>
      <line x1="240" y1="812" x2="840" y2="812" stroke="#E9E9E3" stroke-width="2"/>
      <text x="240" y="884" font-size="32" fill="#232A32">PE kits needed <tspan font-weight="800">Friday</tspan> for</text>
      <text x="240" y="934" font-size="32" fill="#232A32">sports day rehearsal.</text>
      <text x="240" y="1016" font-size="32" fill="#232A32">Museum trip — please pay</text>
      <text x="240" y="1066" font-size="32" fill="#232A32"><tspan font-weight="800">£15 by 15 June</tspan>.</text>
      <text x="240" y="1148" font-size="32" fill="#232A32">Parents' evening booking</text>
      <text x="240" y="1198" font-size="32" fill="#232A32">is now open online…</text>
      <text x="240" y="1290" font-size="28" fill="#9AA4AE" font-style="italic">…tl;dr: too much.</text>
    </g>

    <!-- "snap it" pill -->
    <g>
      <rect x="380" y="1560" width="320" height="78" rx="39" fill="#232A32"/>
      <text x="540" y="1610" font-size="32" font-weight="700" fill="#FFFFFF" text-anchor="middle">📷 Snap it → Nudge</text>
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.6s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- ===================== SCENE 2 — Nudge pulls out the tasks ===================== -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.345;0.38;0.75;0.785;1" dur="14s" repeatCount="indefinite"/>

    <!-- header -->
    <rect x="270" y="300" width="540" height="84" rx="42" fill="#EDF2EF"/>
    <text x="540" y="354" font-size="34" font-weight="800" fill="#3C5A4C" text-anchor="middle">✨ Nudge pulled out 2 things</text>

    <!-- task 1 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.40;0.44;1" dur="14s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 28;0 28;0 0;0 0" keyTimes="0;0.40;0.45;1" dur="14s" repeatCount="indefinite"/>
      <rect x="120" y="560" width="840" height="220" rx="22" fill="#FFFFFF" stroke="#E9E9E3" stroke-width="2"/>
      <text x="170" y="660" font-size="44" font-weight="800" fill="#232A32">🎒 Bring PE kit</text>
      <text x="170" y="720" font-size="30" fill="#667085">Reminder set · before school</text>
      <rect x="740" y="606" width="170" height="78" rx="16" fill="#7BAA94"/>
      <text x="825" y="657" font-size="34" font-weight="800" fill="#FFFFFF" text-anchor="middle">FRI</text>
    </g>

    <!-- task 2 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.50;0.54;1" dur="14s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 28;0 28;0 0;0 0" keyTimes="0;0.50;0.55;1" dur="14s" repeatCount="indefinite"/>
      <rect x="120" y="820" width="840" height="220" rx="22" fill="#FFFFFF" stroke="#E9E9E3" stroke-width="2"/>
      <text x="170" y="920" font-size="44" font-weight="800" fill="#232A32">💷 Pay £15 school trip</text>
      <text x="170" y="980" font-size="30" fill="#667085">Due · 15 June</text>
      <rect x="690" y="866" width="220" height="78" rx="16" fill="#E8A24A"/>
      <text x="800" y="917" font-size="32" font-weight="800" fill="#FFFFFF" text-anchor="middle">15 JUN</text>
    </g>

    <!-- footnote -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.58;0.62;1" dur="14s" repeatCount="indefinite"/>
      <text x="540" y="1180" font-size="34" fill="#3C5A4C" text-anchor="middle" font-weight="700">Added to your timeline.</text>
      <text x="540" y="1240" font-size="32" fill="#667085" text-anchor="middle">You'll get a nudge before each one.</text>
    </g>
  </g>

  <!-- ===================== SCENE 3 — the promo / CTA ===================== -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.785;0.82;0.99;1" dur="14s" repeatCount="indefinite"/>

    <text x="540" y="560" font-size="52" font-weight="800" fill="#232A32" text-anchor="middle">Stop holding it all</text>
    <text x="540" y="628" font-size="52" font-weight="800" fill="#232A32" text-anchor="middle">in your head.</text>

    <!-- promo card -->
    <rect x="110" y="760" width="860" height="420" rx="28" fill="#FFFFFF" stroke="#7BAA94" stroke-width="3"/>
    <text x="540" y="860" font-size="64" text-anchor="middle">🎁</text>
    <text x="540" y="952" font-size="44" font-weight="800" fill="#232A32" text-anchor="middle">First 10 to register</text>
    <text x="540" y="1014" font-size="44" font-weight="800" fill="#232A32" text-anchor="middle">interest get Nudge Pro</text>
    <text x="540" y="1090" font-size="50" font-weight="800" fill="#7BAA94" text-anchor="middle">FREE for life</text>

    <text x="540" y="1320" font-size="40" font-weight="800" fill="#232A32" text-anchor="middle">nudgelive.co.uk</text>
    <g>
      <rect x="360" y="1380" width="360" height="86" rx="43" fill="#7BAA94"/>
      <text x="540" y="1436" font-size="34" font-weight="800" fill="#FFFFFF" text-anchor="middle">Link in bio 👆</text>
      <animate attributeName="opacity" values="0.55;1;0.55" dur="1.4s" repeatCount="indefinite"/>
    </g>
    <text x="540" y="1560" font-size="28" fill="#9AA4AE" text-anchor="middle">📱 Coming soon to Google Play</text>
  </g>

  <!-- story progress bar -->
  <rect x="0" y="1900" width="0" height="20" fill="#7BAA94">
    <animate attributeName="width" values="0;1080" dur="14s" repeatCount="indefinite"/>
  </rect>
</svg>
