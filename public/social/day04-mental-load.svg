<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920" font-family="Inter, Arial, sans-serif">
  <!-- Nudge — Day 4 (mental-load): animated 9:16, loops 14s. Screen-record full-screen on a phone. -->
  <rect width="1080" height="1920" fill="#9FD3BD"/>
  <g transform="translate(475.0,67.0) scale(0.499)"><path d="M 16 16 L 50 16 A 34 34 0 0 1 84 50 L 84 84 L 50 84 A 34 34 0 0 1 16 50 Z" fill="none" stroke="#7BAA94" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/><text x="45" y="64" font-size="44" font-weight="700" fill="#232A32" text-anchor="middle">n</text><circle cx="64" cy="59" r="5.5" fill="#F5B52E"/></g><text x="540" y="104" font-size="34" font-weight="800" fill="#232A32">nudge</text>
  <g opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.03;0.07;1" dur="14s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 26;0 26;0 0;0 0" keyTimes="0;0.03;0.07;1" dur="14s" repeatCount="indefinite"/><text x="540" y="240" font-size="58" font-weight="800" fill="#232A32" text-anchor="middle">The mental load is</text>
  <text x="540" y="312" font-size="58" font-weight="800" fill="#232A32" text-anchor="middle">invisible — until you</text>
  <text x="540" y="384" font-size="58" font-weight="800" fill="#232A32" text-anchor="middle">write it ALL down</text></g>
  <g opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.1;0.18;1" dur="14s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 26;0 26;0 0;0 0" keyTimes="0;0.1;0.18;1" dur="14s" repeatCount="indefinite"/><g transform="rotate(-3 510 786)"><rect x="330" y="760" width="360" height="52" rx="12" fill="#3C5A4C" stroke="#0000001a" stroke-width="2"/><text x="350" y="795" font-size="24" font-weight="700" fill="#232A32">School trip form</text></g><g transform="rotate(3 510 716)"><rect x="345" y="690" width="330" height="52" rx="12" fill="#FFFFFF" stroke="#0000001a" stroke-width="2"/><text x="365" y="725" font-size="24" font-weight="700" fill="#232A32">Call the dentist</text></g><g transform="rotate(-3 510 646)"><rect x="360" y="620" width="300" height="52" rx="12" fill="#FFFFFF" stroke="#0000001a" stroke-width="2"/><text x="380" y="655" font-size="24" font-weight="700" fill="#232A32">Pay the gas bill</text></g><g transform="rotate(3 510 576)"><rect x="375" y="550" width="270" height="52" rx="12" fill="#FFFFFF" stroke="#0000001a" stroke-width="2"/><text x="395" y="585" font-size="24" font-weight="700" fill="#232A32">Renew the car tax</text></g><circle cx="540" cy="900" r="78" fill="none" stroke="#232A32" stroke-width="9"/><path d="M 470 1010 q 70 -70 140 0" fill="none" stroke="#232A32" stroke-width="9" stroke-linecap="round"/></g>
  <g opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.42;0.5;1" dur="14s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 26;0 26;0 0;0 0" keyTimes="0;0.42;0.5;1" dur="14s" repeatCount="indefinite"/><path d="M 540 1080 l 0 60 M 518 1116 l 22 26 l 22 -26" fill="none" stroke="#3C5A4C" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/><text x="540" y="1200" font-size="34" font-weight="800" fill="#3C5A4C" text-anchor="middle">…now it's all held for you</text></g>
  <g opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.78;0.84;1" dur="14s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="translate" values="0 26;0 26;0 0;0 0" keyTimes="0;0.78;0.84;1" dur="14s" repeatCount="indefinite"/><rect x="90" y="1640" width="900" height="210" rx="28" fill="#232A32"/><text x="540" y="1716" font-size="33" font-weight="800" fill="#ECE6D6" text-anchor="middle">First 10 to register = Pro free for life</text><text x="540" y="1772" font-size="29" font-weight="700" fill="#9FD3BD" text-anchor="middle">then 3 months free for everyone else</text><text x="540" y="1822" font-size="31" font-weight="800" fill="#E8A24A" text-anchor="middle">nudgelive.co.uk</text></g>
  <rect x="0" y="1900" width="0" height="20" fill="#3C5A4C">
    <animate attributeName="width" values="0;1080" dur="14s" repeatCount="indefinite"/>
  </rect>
</svg>
