name: nudge cron (reminders)

# Free scheduler for reminder dispatch. GitHub runs this best-effort (it can be
# delayed a few minutes under load and won't honour intervals tighter than ~5
# min), so it pings the app's secured dispatch endpoint frequently. The daily
# digest runs on its own slower schedule in cron-digest.yml.
#
# Required repository secret (Settings -> Secrets and variables -> Actions):
#   CRON_SECRET   the same value set in the app's environment
# The app URL is public, so it's set inline below (edit if your URL changes).
on:
  schedule:
    - cron: "*/5 * * * *" # every 5 minutes (GitHub's reliable floor)
  workflow_dispatch: {} # allow manual runs from the Actions tab

env:
  APP_BASE_URL: https://nudge-s1mn.onrender.com

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Fire due reminders
        run: |
          curl -fsS -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "$APP_BASE_URL/api/cron/dispatch" && echo
