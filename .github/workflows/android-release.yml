name: Release Android (AAB + signed APK)

# Builds a Play-Store-ready signed AAB and a sideloadable signed APK, then
# publishes them to a GitHub Release. The home page links the release's
# "latest" asset, so a new release automatically updates the public download.
#
# Trigger: push a tag like v1.0.0, or run manually from the Actions tab.
# Requires repo secrets:
#   ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,
#   ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps (incl. Capacitor)
        run: |
          npm install
          npm i -D @capacitor/cli
          npm i @capacitor/core @capacitor/android @capacitor/push-notifications @capacitor/preferences @capacitor/filesystem @capacitor/camera send-intent

      - name: Add Android platform
        run: npx cap add android

      - name: Generate launcher icons + splash (brand logo)
        run: npx @capacitor/assets@3 generate --android --assetPath assets

      - name: Add Firebase config + Gradle plugins
        run: |
          cp native/google-services.json android/app/google-services.json
          node native/patch-gradle.js
          node native/patch-signing.js

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Add share-target + home-screen widget (native)
        run: |
          node native/patch-share.js
          node native/patch-widget.js

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload.keystore

      - name: Build signed AAB + APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease --no-daemon --stacktrace

      - name: Stage release assets
        run: |
          mkdir -p dist
          cp android/app/build/outputs/bundle/release/app-release.aab dist/nudge.aab
          cp android/app/build/outputs/apk/release/app-release.apk dist/nudge.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('build-{0}', github.run_number) }}
          name: nudge Android ${{ github.ref_type == 'tag' && github.ref_name || format('build {0}', github.run_number) }}
          generate_release_notes: true
          draft: false
          prerelease: false
          make_latest: "true"
          files: |
            dist/nudge.apk
            dist/nudge.aab
