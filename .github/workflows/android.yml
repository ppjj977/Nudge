name: Build Android (debug APK)

# Manual trigger: Actions tab → "Build Android (debug APK)" → Run workflow.
# Produces a sideloadable debug APK (FCM works) as a downloadable artifact.
# (Release signing for the Play Store is a later step.)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps (incl. Capacitor)
        run: |
          npm install
          npm i -D @capacitor/cli
          npm i @capacitor/core @capacitor/android @capacitor/push-notifications @capacitor/preferences @capacitor/filesystem @capacitor/camera@7.0.0 send-intent

      - name: Add Android platform
        run: npx cap add android

      - name: Generate launcher icons + splash (brand logo)
        run: npx @capacitor/assets@3 generate --android --assetPath assets

      - name: Add Firebase config + Gradle plugin
        run: |
          cp native/google-services.json android/app/google-services.json
          node native/patch-gradle.js

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Add share-target + home-screen widget (native)
        run: |
          node native/patch-share.js
          node native/patch-widget.js

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nudge-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
